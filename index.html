<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- START SCREEN -->
  <div class="screen active" id="start-screen">
    <h1>Welcome to the Quiz Game!</h1>
    <button id="start-btn">Start Quiz</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="quiz-screen">
    
    <div class="quiz-header">
      <h2 id="question-text">Question</h2>

      <div class="quiz-info">
        <p><span id="current-question">1</span> / <span id="total-questions">5</span></p>
        <p>Score: <span id="score">0</span></p>
      </div>
    </div>

    <div id="answers-container" class="answer-container"></div>

    <div class="progress-bar">
      <div id="progress" class="progress"></div>
    </div>

  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="result-screen">
    <h1>Quiz Results</h1>

    <div class="result-info">
      <p>Your score: 
        <span id="final-score">0</span> / 
        <span id="max-score">5</span>
      </p>

      <div id="result-message">Good Job!</div>
    </div>

    <button id="restart-btn">Restart Quiz</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
